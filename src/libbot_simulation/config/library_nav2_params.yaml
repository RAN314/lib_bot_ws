amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    initial_pose.x: 5.0
    initial_pose.y: 5.0
    initial_pose.z: 0.3
    initial_pose.yaw: 0.0
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "differential"
    save_pose_rate: 0.5
    set_initial_pose: true
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

amcl_map_client:
  ros__parameters:
    use_sim_time: True

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator:
  ros__parameters:
    use_sim_time: True
    bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    default_nav_to_pose_bt_xml: "$(find nav2_bt_navigator)/behavior_trees/navigate_w_replanning_and_recovery.xml"
    plugin_names: ["navigate_to_pose", "follow_path", "follow_waypoints", "backup", "wait", "spin", "drive_on_heading"]
    plugin_lib_names: ["nav2_compute_path_to_pose_action_bt_node", "nav2_compute_path_through_poses_action_bt_node", "nav2_smooth_path_action_bt_node", "nav2_follow_path_action_bt_node", "nav2_spin_action_bt_node", "nav2_wait_action_bt_node", "nav2_back_up_action_bt_node", "nav2_drive_on_heading_bt_node", "nav2_force_success_bt_node", "nav2_retry_bt_node", "nav2_recovery_node_bt_node", "nav2_pipeline_sequence_bt_node", "nav2_goal_updater_bt_node", "nav2_is_stuck_condition_bt_node", "nav2_goal_updated_condition_bt_node"]

dwb_controller:
  ros__parameters:
    use_sim_time: True
    debug_trajectory_details: True
    min_vel_x: 0.0
    min_vel_y: 0.0
    max_vel_x: 0.26
    max_vel_y: 0.0
    max_vel_theta: 1.0
    min_speed_xy: 0.0
    max_speed_xy: 0.26
    min_speed_theta: 0.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    acc_lim_x: 2.5
    acc_lim_y: 0.0
    acc_lim_theta: 3.2
    decel_lim_x: -2.5
    decel_lim_y: 0.0
    decel_lim_theta: -3.2
    vx_samples: 20
    vy_samples: 5
    vtheta_samples: 20
    sim_time: 1.7
    linear_granularity: 0.05
    xy_goal_tolerance: 0.25
    transform_tolerance: 0.2
    critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
    BaseObstacle.scale: 0.02
    PathAlign.scale: 0.0
    GoalAlign.scale: 0.0
    PathDist.scale: 32.0
    GoalDist.scale: 24.0
    RotateToGoal.scale: 32.0

diff_drive_controller:
  ros__parameters:
    type: diff_drive_controller/DiffDriveController
    left_wheel_names: ['wheel_left_joint']
    right_wheel_names: ['wheel_right_joint']
    wheel_separation: 0.287
    wheel_radius: 0.033

    publish_rate: 50.0
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # 速度限制
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 0.26
        min_velocity: -0.26
        has_acceleration_limits: true
        max_acceleration: 0.5

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.82
        min_velocity: -1.82
        has_acceleration_limits: true
        max_acceleration: 1.5

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: odom
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      inflation_layer.cost_scaling_factor: 3.0
      inflation_layer.inflation_radius: 0.30
      obstacle_layer:
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_radius: 0.22
      obstacle_layer:
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
      inflation_layer.cost_scaling_factor: 3.0
      inflation_layer.inflation_radius: 0.30
      always_send_full_costmap: True
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer.enabled: True
      static_layer.enabled: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "$(find aws_robomaker_bookstore_world)/maps/turtlebot3_waffle_pi/map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names: ['map_server', 'amcl', 'controller_server', 'planner_server', 'bt_navigator']

lifecycle_manager_service_client:
  ros__parameters:
    use_sim_time: True

lifecycle_manager_client_service_client:
  ros__parameters:
    use_sim_time: True

navfn_planner:
  ros__parameters:
    use_sim_time: True
    tolerance: 0.0
    use_astar: false

navfn_planner_GetCostmap_client:
  ros__parameters:
    use_sim_time: True

planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased.plugin: "nav2_navfn_planner/NavfnPlanner"
    GridBased.tolerance: 0.0
    GridBased.use_astar: false

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

world_model:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_plugins: ["FollowPath"]
    FollowPath.plugin: "dwb_core::DWBLocalPlanner"
    FollowPath.debug_trajectory_details: True
    FollowPath.min_vel_x: 0.0
    FollowPath.min_vel_y: 0.0
    FollowPath.max_vel_x: 0.26
    FollowPath.max_vel_y: 0.0
    FollowPath.max_vel_theta: 1.0
    FollowPath.min_speed_xy: 0.0
    FollowPath.max_speed_xy: 0.26
    FollowPath.min_speed_theta: 0.0
    FollowPath.min_x_velocity_threshold: 0.001
    FollowPath.min_y_velocity_threshold: 0.5
    FollowPath.min_theta_velocity_threshold: 0.001
    FollowPath.acc_lim_x: 2.5
    FollowPath.acc_lim_y: 0.0
    FollowPath.acc_lim_theta: 3.2
    FollowPath.decel_lim_x: -2.5
    FollowPath.decel_lim_y: 0.0
    FollowPath.decel_lim_theta: -3.2
    FollowPath.vx_samples: 20
    FollowPath.vy_samples: 5
    FollowPath.vtheta_samples: 20
    FollowPath.sim_time: 1.7
    FollowPath.linear_granularity: 0.05
    FollowPath.xy_goal_tolerance: 0.25
    FollowPath.transform_tolerance: 0.2